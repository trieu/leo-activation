services:
  api:
    build: .
    image: leo-activation:latest
    container_name: my_running_api
    ports:
      # SECURE BINDING: Only Nginx (or host-level tools) can talk to the API
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # Override for Docker: localhost won't work inside a container
      - ARANGO_HOST=http://host.docker.internal:8529
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: my_redis_cache
    restart: unless-stopped
    # SECURITY FIX: No 'ports' section here! 
    # Redis is completely invisible to the outside world.

  ngrok:
    image: ngrok/ngrok:latest
    container_name: my_ngrok_tunnel
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Pulls your auth token securely from the same .env file
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    # Ngrok uses Docker's internal DNS to route directly to the 'api' service!
    # PRO-TIP: Add your free static domain here so the Zalo webhook never breaks.
    command: "http api:8000 --domain=kirby-nonclarifiable-nonembryonically.ngrok-free.dev"
    ports:
      # SECURE BINDING: Exposes the Ngrok X-Ray dashboard only to the local server
      - "127.0.0.1:4040:4040"