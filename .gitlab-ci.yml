# ---------------------------------------------------------
# STAGE 2: BUILD MAIN APP (FastAPI / Celery)
# ---------------------------------------------------------
build_core_api:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    # Notice we added "/core" to the registry path. 
    # This leaves room for "$CI_REGISTRY_IMAGE/cdc_poller" later!
    IMAGE_TAG: $CI_REGISTRY_IMAGE/core:$CI_COMMIT_SHORT_SHA
    IMAGE_LATEST: $CI_REGISTRY_IMAGE/core:latest
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    # Building from the root Dockerfile
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  rules:
    # Only run this build when code is pushed to the main branch
    - if: '$CI_COMMIT_BRANCH == "DATA-146-standardize-pipeline"'

