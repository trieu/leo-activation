stages:
  # - test  # TEMPORARILY DISABLED: Pending DB mocking/Service Containers
  - build
  - deploy

# ---------------------------------------------------------
# STAGE 2: BUILD MAIN APP (FastAPI / Celery)
# ---------------------------------------------------------
build_core_api:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE/core:$CI_COMMIT_SHORT_SHA
    IMAGE_LATEST: $CI_REGISTRY_IMAGE/core:latest
    DOCKER_TLS_CERTDIR: ""
    # 1. Enable modern Docker BuildKit
    DOCKER_BUILDKIT: 1
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    # 2. Tell Docker to pull the 'latest' image from the registry to use as a cache
    - docker pull $IMAGE_LATEST || true
    # 3. Build the image using the downloaded cache
    - docker build --cache-from $IMAGE_LATEST --build-arg BUILDKIT_INLINE_CACHE=1 -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  rules:
    - if: '$CI_COMMIT_BRANCH == "DATA-146-standardize-pipeline"'

