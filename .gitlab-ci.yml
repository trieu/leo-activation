# ---------------------------------------------------------
# STAGE 4: DEPLOY TO STAGING
# ---------------------------------------------------------
deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $PROD_SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh $PROD_USER@$PROD_SERVER_IP "export DOCKER_CONFIG=~/.docker-ci && mkdir -p ~/.docker-ci && echo '{}' > ~/.docker-ci/config.json && echo \"$CI_REGISTRY_PASSWORD\" | docker login -u \"$CI_REGISTRY_USER\" --password-stdin $CI_REGISTRY && cd ~/prod-app && bash deploy_blue_green.sh"
  environment:
    name: production
  rules:
    # Trigger manually when code is merged/pushed to api-ai-team
    - if: '$CI_COMMIT_BRANCH == "api-ai-team"'
      when: manual