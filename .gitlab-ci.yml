deploy_staging:
  stage: deploy
  image: alpine:latest
  before_script:
    # Install SSH tools so the CI container can talk to the host machine
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $STAGING_SERVER_IP >> ~/.ssh/known_hosts
  script:
    # SSH into the machine, log into the registry, pull the new image, and restart compose
    - ssh $STAGING_USER@$STAGING_SERVER_IP "cd ~/staging-app && docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY && docker compose pull && docker compose up -d"
  only:
    - api-ai-team
  rules:
    - if: '$CI_COMMIT_BRANCH == "DATA-146-standardize-pipeline"'